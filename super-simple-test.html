<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Super Simple Test</title>
  <style>
    body { margin:0; background:#151827; display:grid; place-items:center; height:100vh; }
    canvas { border:2px solid #d7a84f; }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="640"></canvas>
  
  <script>
    // SUPER SIMPLE - NO CRASHES
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // Draw background
    ctx.fillStyle = '#151827';
    ctx.fillRect(0, 0, 960, 640);
    
    // Draw title
    ctx.fillStyle = '#ffd76c';
    ctx.font = '48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PIG & SWINE', 480, 200);
    
    ctx.fillStyle = '#f5ead2';
    ctx.font = '24px monospace';
    ctx.fillText('If you see this, canvas works from file://', 480, 280);
    
    ctx.fillStyle = '#526f45';
    ctx.font = '18px monospace';
    ctx.fillText('Now checking if JS runs...', 480, 350);
    
    // Simple test
    try {
      const test = 'JavaScript is working!';
      ctx.fillStyle = '#aa3d42';
      ctx.fillText(test, 480, 400);
      console.log('Test passed!');
    } catch(e) {
      ctx.fillStyle = '#aa3d42';
      ctx.fillText('Error: ' + e.message, 480, 400);
    }
  </script>
</body>
</html>
